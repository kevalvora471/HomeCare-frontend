<div class="page-wrapper" (click)="closeMenu()">

  <h1 class="page-title">Master Data</h1>

  <div class="card">

    <div class="card-header">
      <h2 class="section-title">Service Types</h2>
      <button class="btn-add" (click)="addService()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
          stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        Add
      </button>
    </div>

    <div class="table-header">
      <span>Name</span>
      <span>Action</span>
    </div>

    <div class="table-body">
      @for (service of services; track service.name; let i = $index) {
      <div class="row">

        <div class="row-name">
          <div class="row-icon">{{ service.icon }}</div>
          <span>{{ service.name }}</span>
        </div>

        <!-- Action Menu -->
        <div class="action-wrap" (click)="$event.stopPropagation()">

          <button class="more-btn" (click)="onMenuClick(i)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <circle cx="12" cy="5" r="1.5" />
              <circle cx="12" cy="12" r="1.5" />
              <circle cx="12" cy="19" r="1.5" />
            </svg>
          </button>

          @if (openMenuIndex === i) {
          <div class="dropdown">
            <button class="dropdown-item" (click)="onManage(service)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                stroke-linejoin="round">
                <line x1="8" y1="6" x2="21" y2="6" />
                <line x1="8" y1="12" x2="21" y2="12" />
                <line x1="8" y1="18" x2="21" y2="18" />
                <line x1="3" y1="6" x2="3.01" y2="6" />
                <line x1="3" y1="12" x2="3.01" y2="12" />
                <line x1="3" y1="18" x2="3.01" y2="18" />
              </svg>
              Manage
            </button>
            <button class="dropdown-item" (click)="onEdit(service)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
              </svg>
              Edit
            </button>
            <button class="dropdown-item delete" (click)="onDelete(service)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6" />
                <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" />
                <path d="M10 11v6M14 11v6" />
                <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2" />
              </svg>
              Delete
            </button>
          </div>
          }

        </div>
      </div>
      }
    </div>

  </div>
</div>
