<section class="services-section">
    <div class="container">
        <div class="section-header">
            <h2>{{title}}</h2>
            <a href="#" class="see-more">
                See More
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </a>
        </div>

        <div class="service-wrapper">
            <!-- Nav Arrows -->
            <button class="nav-arrow prev" (click)="prev()" [class.hidden]="currentIndex === 0">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>

            <div class="carousel-container">
                <div class="service-grid"
                    [style.transform]="'translateX(-' + (currentIndex * (100 / itemsPerView)) + '%)'">
                    <div class="service-item" *ngFor="let service of services">
                        <div class="service-card">
                            <div class="service-image">
                                <img [src]="service.image" [alt]="service.name">
                            </div>
                            <div class="service-content">
                                <h3 class="service-name">{{service.name}}</h3>
                                <div class="service-price">
                                    <div class="price-info">
                                        <span class="price-label">Starts at</span>
                                        <span class="price-value">${{service.price}}</span>
                                    </div>
                                    <button class="btn-add">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round">
                                            <line x1="12" y1="5" x2="12" y2="19"></line>
                                            <line x1="5" y1="12" x2="19" y2="12"></line>
                                        </svg>
                                        Add
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <button class="nav-arrow next" (click)="next()"
                [class.hidden]="currentIndex >= services.length - itemsPerView">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
        </div>
    </div>
</section>
