<section class="categories">
    <div class="container">
        <h2>What are you looking for?</h2>

        <div class="category-wrapper">
            <!-- Nav Arrows -->
            <button class="nav-arrow prev" (click)="prev()" [class.hidden]="currentIndex === 0">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
            </button>

            <div class="carousel-container">
                <div class="category-grid" [style.transform]="'translateX(-' + (currentIndex * (100 / 6)) + '%)'">
                    <div class="category-item" *ngFor="let cat of categories">
                        <div class="category-card">
                            <img [src]="cat.icon" [alt]="cat.name">
                        </div>
                        <span class="category-name">{{cat.name}}</span>
                    </div>
                </div>
            </div>

            <button class="nav-arrow next" (click)="next()" [class.hidden]="currentIndex >= categories.length - 6">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 18 15 12 9 6"></polyline>
                </svg>
            </button>
        </div>
    </div>
</section>
